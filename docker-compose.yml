version: "3.8"

services:
  mysql:
    image: mysql:8.4
    container_name: kurope-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: kurope
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - kurope-mysql-data:/var/lib/mysql

volumes:
  kurope-mysql-data: